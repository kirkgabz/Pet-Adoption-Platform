{% extends "base.html" %}
{% block content %}
<section class="panel narrow">
  {% include "adoption/partials/back_link.html" with back_url=object.get_absolute_url back_label="Back to Shelter" %}
  <h1>Delete {{ object.name }}?</h1>
  <form class="form-actions" method="post">{% csrf_token %}<a class="button" href="{{ object.get_absolute_url }}">Cancel</a><button class="danger">Delete</button></form>
</section>
{% endblock %}
