{% extends "base.html" %}
{% block content %}
<section class="panel narrow form-panel">
  {% url 'user-list' as user_back_url %}
  {% include "adoption/partials/back_link.html" with back_url=user_back_url back_label="Back to Users" %}
  <div class="form-heading">
    <p class="eyebrow">User Management</p>
    <h1>Edit User</h1>
  </div>
  <form class="object-form" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <a class="button" href="{% url 'user-list' %}">Cancel</a>
      <button class="primary">Save</button>
    </div>
  </form>
</section>
{% endblock %}
