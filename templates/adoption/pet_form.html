{% extends "base.html" %}
{% block title %}Pet Form{% endblock %}
{% block content %}
<section class="panel">
  <h1>{% if object %}Edit Pet{% else %}Post Pet{% endif %}</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary">{% if object %}Save{% else %}Post{% endif %}</button>
  </form>
</section>
{% endblock %}
