{% extends "base.html" %}
{% block content %}
<section class="panel narrow form-panel">
  <div class="form-heading">
    <p class="eyebrow">Application Status</p>
    <h1>Edit Application</h1>
    <p class="muted">Update the adoption status so everyone sees the latest step.</p>
  </div>
  <form class="object-form" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <a class="button" href="{% url 'application-list' %}">Cancel</a>
      <button class="primary">Save Status</button>
    </div>
  </form>
</section>
{% endblock %}
