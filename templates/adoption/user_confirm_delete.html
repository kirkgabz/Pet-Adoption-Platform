{% extends "base.html" %}
{% block content %}
<section class="panel narrow">
  {% url 'user-list' as user_back_url %}
  {% include "adoption/partials/back_link.html" with back_url=user_back_url back_label="Back to Users" %}
  <h1>Delete {{ object.username }}?</h1>
  <form class="form-actions" method="post">
    {% csrf_token %}
    <a class="button" href="{% url 'user-list' %}">Cancel</a>
    <button class="danger">Delete</button>
  </form>
</section>
{% endblock %}
