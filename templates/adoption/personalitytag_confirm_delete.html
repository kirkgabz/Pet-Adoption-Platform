{% extends "base.html" %}
{% block content %}
<section class="panel narrow">
  {% url 'tag-list' as tag_back_url %}
  {% include "adoption/partials/back_link.html" with back_url=tag_back_url back_label="Back to Tags" %}
  <h1>Delete {{ object.name }}?</h1>
  <form class="form-actions" method="post">
    {% csrf_token %}
    <a class="button" href="{% url 'tag-list' %}">Cancel</a>
    <button class="danger">Delete</button>
  </form>
</section>
{% endblock %}
